<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Tag! 🐾</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #lobby {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 24px;
    padding: 2.5rem 3rem;
    max-width: 520px;
    width: 90%;
    color: white;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
  }
  #lobby h1 { font-size: 3rem; margin-bottom: 0.25rem; }
  #lobby .subtitle { opacity: 0.85; font-size: 1rem; margin-bottom: 2rem; }
  .lobby-form { display: flex; flex-direction: column; gap: 1rem; text-align: left; }
  .lobby-form label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.8; margin-bottom: 4px; display: block; }
  .lobby-form input[type="text"] {
    width: 100%; padding: 0.75rem 1rem; border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15);
    color: white; font-size: 1rem; outline: none;
    transition: border-color 0.2s;
  }
  .lobby-form input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
  .lobby-form input[type="text"]:focus { border-color: rgba(255,255,255,0.8); }
  .animal-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .animal-btn {
    background: rgba(255,255,255,0.15); border: 2px solid transparent;
    border-radius: 12px; padding: 8px 4px; cursor: pointer; text-align: center;
    transition: all 0.15s; color: white; font-size: 0.7rem;
  }
  .animal-btn .emoji { font-size: 1.8rem; display: block; }
  .animal-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
  .animal-btn.selected { border-color: #ffd700; background: rgba(255,215,0,0.25); }
  #join-btn {
    background: #ffd700; color: #1a1a2e; font-size: 1.1rem; font-weight: 700;
    border: none; border-radius: 12px; padding: 0.9rem; cursor: pointer;
    transition: all 0.15s; margin-top: 0.5rem;
  }
  #join-btn:hover { background: #ffe033; transform: translateY(-2px); }
  .room-row { display: flex; gap: 8px; }
  .room-row input { flex: 1; }
  #gen-room-btn {
    background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
    color: white; border-radius: 12px; padding: 0 1rem; cursor: pointer;
    font-size: 0.85rem; white-space: nowrap; transition: background 0.15s;
  }
  #gen-room-btn:hover { background: rgba(255,255,255,0.35); }
  .share-tip {
    background: rgba(255,255,255,0.15); border-radius: 10px; padding: 0.75rem 1rem;
    font-size: 0.82rem; opacity: 0.9; line-height: 1.5;
  }
  #game-ui { display: none; flex-direction: column; align-items: center; width: 100%; height: 100vh; }
  #hud {
    width: 100%; max-width: 820px;
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #hud-title { color: white; font-weight: 700; font-size: 1.1rem; }
  #it-banner {
    flex: 1; text-align: center; font-weight: 700; font-size: 0.95rem;
    padding: 4px 12px; border-radius: 8px; transition: background 0.3s, color 0.3s;
  }
  #it-banner.is-it { background: #ff4444; color: white; animation: pulse 1s infinite; }
  #it-banner.not-it { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  #scoreboard { display: flex; gap: 8px; align-items: center; }
  .score-chip {
    background: rgba(255,255,255,0.12); border-radius: 8px;
    padding: 3px 8px; font-size: 0.78rem; color: rgba(255,255,255,0.85);
    display: flex; align-items: center; gap: 4px;
  }
  .score-chip.me { background: rgba(255,215,0,0.25); color: #ffd700; }
  #canvas-wrap { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; }
  #gameCanvas { display: block; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  #tag-flash {
    position: absolute; inset: 0; border-radius: 12px;
    pointer-events: none; opacity: 0;
    background: radial-gradient(circle, rgba(255,100,100,0.6) 0%, transparent 70%);
    transition: opacity 0.1s;
  }
  #tag-flash.show { opacity: 1; }
  #mobile-controls { display: none; position: absolute; bottom: 16px; width: 160px; height: 160px; }
  .dpad-btn {
    position: absolute; width: 48px; height: 48px;
    background: rgba(255,255,255,0.2); border: none; border-radius: 10px;
    color: white; font-size: 1.2rem; cursor: pointer; touch-action: none;
  }
  .dpad-btn:active { background: rgba(255,255,255,0.45); }
  #ctrl-up    { top: 0;   left: 56px; }
  #ctrl-down  { bottom: 0; left: 56px; }
  #ctrl-left  { top: 56px; left: 0; }
  #ctrl-right { top: 56px; right: 0; }
  #tag-notification {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
    border-radius: 12px; font-weight: 600; font-size: 1rem;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    z-index: 99; white-space: nowrap;
  }
  #tag-notification.show { opacity: 1; }
  @media (max-width: 600px) { #mobile-controls { display: block; } }
</style>
</head>
<body>
<div id="lobby">
  <h1>🐾 Animal Tag!</h1>
  <p class="subtitle">Chase your friends — whoever gets tagged becomes IT!</p>
  <div class="lobby-form">
    <div>
      <label>Your name</label>
      <input type="text" id="name-input" placeholder="e.g. Jack" maxlength="16" autocomplete="off" />
    </div>
    <div>
      <label>Pick your animal</label>
      <div class="animal-grid" id="animal-grid"></div>
    </div>
    <div>
      <label>Room code <span style="font-weight:400;opacity:0.7">(share with friends)</span></label>
      <div class="room-row">
        <input type="text" id="room-input" placeholder="e.g. jungle-42" maxlength="20" autocomplete="off" />
        <button id="gen-room-btn">New 🎲</button>
      </div>
    </div>
    <div class="share-tip">
      💡 Everyone who enters the same room code plays together — just share the code (or the full page URL after joining)!
    </div>
    <button id="join-btn">Join Game! 🚀</button>
  </div>
</div>
<div id="game-ui">
  <div id="hud">
    <span id="hud-title">🐾 Animal Tag</span>
    <div id="it-banner" class="not-it">Loading…</div>
    <div id="scoreboard"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="tag-flash"></div>
    <div id="mobile-controls">
      <button class="dpad-btn" id="ctrl-up">▲</button>
      <button class="dpad-btn" id="ctrl-down">▼</button>
      <button class="dpad-btn" id="ctrl-left">◀</button>
      <button class="dpad-btn" id="ctrl-right">▶</button>
    </div>
  </div>
</div>
<div id="tag-notification"></div>
<script>
const WORLD_W = 800, WORLD_H = 600;
const PLAYER_R = 22;
const SPEED = 220;
const TAG_RANGE = 55;
const ANIMALS = [
  { id:'cat',   emoji:'🐱', label:'Cat',   color:'#ff6b6b' },
  { id:'dog',   emoji:'🐶', label:'Dog',   color:'#ffa94d' },
  { id:'fox',   emoji:'🦊', label:'Fox',   color:'#ff8c42' },
  { id:'panda', emoji:'🐼', label:'Panda', color:'#748ffc' },
  { id:'frog',  emoji:'🐸', label:'Frog',  color:'#51cf66' },
  { id:'bunny', emoji:'🐰', label:'Bunny', color:'#f783ac' },
  { id:'bear',  emoji:'🐻', label:'Bear',  color:'#a9836b' },
  { id:'duck',  emoji:'🦆', label:'Duck',  color:'#ffd43b' },
  { id:'owl',   emoji:'🦉', label:'Owl',   color:'#cc5de8' },
  { id:'tiger', emoji:'🐯', label:'Tiger', color:'#ff922b' },
];
const MAP_OBSTACLES = [
  { x:120, y:80,  w:50, h:50, type:'tree' },
  { x:620, y:80,  w:50, h:50, type:'tree' },
  { x:120, y:470, w:50, h:50, type:'tree' },
  { x:620, y:470, w:50, h:50, type:'tree' },
  { x:380, y:40,  w:50, h:50, type:'tree' },
  { x:380, y:510, w:50, h:50, type:'tree' },
  { x:320, y:240, w:160, h:120, type:'pond' },
  { x:200, y:200, w:55, h:40, type:'rock' },
  { x:530, y:330, w:55, h:40, type:'rock' },
  { x:210, y:370, w:45, h:35, type:'rock' },
  { x:530, y:150, w:45, h:35, type:'rock' },
  { x:80,  y:260, w:50, h:35, type:'bush' },
  { x:660, y:260, w:50, h:35, type:'bush' },
  { x:280, y:150, w:45, h:35, type:'bush' },
  { x:460, y:400, w:45, h:35, type:'bush' },
  { x:260, y:180, w:90, h:12, type:'fence' },
  { x:440, y:420, w:90, h:12, type:'fence' },
];
const SOLID_TYPES = new Set(['tree','rock','pond','fence']);
function isSolid(obs) { return SOLID_TYPES.has(obs.type); }
function circleRect(cx,cy,cr,rx,ry,rw,rh) {
  const nearX=Math.max(rx,Math.min(cx,rx+rw)), nearY=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nearX, dy=cy-nearY;
  return dx*dx+dy*dy<cr*cr;
}
function resolveCollision(x,y) {
  for (const obs of MAP_OBSTACLES) {
    if (!isSolid(obs)) continue;
    if (circleRect(x,y,PLAYER_R,obs.x,obs.y,obs.w,obs.h)) {
      const cx=obs.x+obs.w/2, cy=obs.y+obs.h/2;
      const dx=x-cx, dy=y-cy;
      const ox=obs.w/2+PLAYER_R, oy=obs.h/2+PLAYER_R;
      if (Math.abs(dx/ox)>Math.abs(dy/oy)) { x=cx+Math.sign(dx)*ox; } else { y=cy+Math.sign(dy)*oy; }
    }
  }
  return { x:Math.max(PLAYER_R,Math.min(WORLD_W-PLAYER_R,x)), y:Math.max(PLAYER_R,Math.min(WORLD_H-PLAYER_R,y)) };
}
const grid = document.getElementById('animal-grid');
let selectedAnimal = ANIMALS[0];
ANIMALS.forEach(a => {
  const btn = document.createElement('button');
  btn.className = 'animal-btn' + (a.id===selectedAnimal.id?' selected':'');
  btn.innerHTML = `<span class="emoji">${a.emoji}</span>${a.label}`;
  btn.onclick = () => { document.querySelectorAll('.animal-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); selectedAnimal=a; };
  grid.appendChild(btn);
});
function makeRoomCode() {
  const words=['jungle','forest','savanna','ocean','meadow','canyon','island','volcano'];
  return words[Math.floor(Math.random()*words.length)]+'-'+Math.floor(Math.random()*99+1);
}
const hashRoom = location.hash.slice(1);
const roomInput = document.getElementById('room-input');
roomInput.value = hashRoom || makeRoomCode();
document.getElementById('gen-room-btn').onclick = () => { roomInput.value = makeRoomCode(); };
document.getElementById('join-btn').onclick = joinLobby;
document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') joinLobby(); });
function joinLobby() {
  const name=document.getElementById('name-input').value.trim();
  const roomId=roomInput.value.trim();
  if (!name) { document.getElementById('name-input').focus(); return; }
  if (!roomId) { roomInput.focus(); return; }
  location.hash = roomId;
  startGame(name, roomId, selectedAnimal);
}
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  const wrap=document.getElementById('canvas-wrap');
  const maxW=Math.min(wrap.clientWidth-32,WORLD_W);
  const scale=maxW/WORLD_W;
  canvas.width=WORLD_W; canvas.height=WORLD_H;
  canvas.style.width=Math.floor(WORLD_W*scale)+'px';
  canvas.style.height=Math.floor(WORLD_H*scale)+'px';
}
window.addEventListener('resize', resizeCanvas);
let ws=null, myId=null, players={}, myAnimal=null, keys={}, lastTime=null, tagCooldown=0, mobileKeys={};
function drawGround() {
  ctx.fillStyle='#5db85d'; ctx.fillRect(0,0,WORLD_W,WORLD_H);
  ctx.fillStyle='#52ad52';
  for (let i=0;i<80;i++) { const gx=(i*137.5)%WORLD_W, gy=(i*97.3)%WORLD_H; ctx.beginPath(); ctx.ellipse(gx,gy,18,10,(i*0.7),0,Math.PI*2); ctx.fill(); }
  ctx.fillStyle='#c8a96e'; ctx.beginPath(); ctx.ellipse(400,300,280,60,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b8995e'; ctx.beginPath(); ctx.ellipse(400,300,270,50,0,0,Math.PI*2); ctx.fill();
}
function drawObstacles() {
  for (const obs of MAP_OBSTACLES) {
    if (obs.type==='bush') drawBush(obs);
    else if (obs.type==='tree') drawTree(obs);
    else if (obs.type==='rock') drawRock(obs);
    else if (obs.type==='pond') drawPond(obs);
    else if (obs.type==='fence') drawFence(obs);
  }
}
function drawBush(obs) {
  const cx=obs.x+obs.w/2, cy=obs.y+obs.h/2;
  ctx.fillStyle='#2d8a2d';
  ctx.beginPath(); ctx.ellipse(cx-12,cy,22,18,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+12,cy,22,18,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#38a838'; ctx.beginPath(); ctx.ellipse(cx,cy-6,20,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc3333';
  ctx.beginPath(); ctx.arc(cx-8,cy-4,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+6,cy+2,3,0,Math.PI*2); ctx.fill();
}
function drawTree(obs) {
  const cx=obs.x+obs.w/2, cy=obs.y+obs.h/2;
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(cx+5,cy+18,20,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8B5E3C'; ctx.fillRect(cx-6,cy,12,22);
  ctx.fillStyle='#2d6e2d'; ctx.beginPath(); ctx.arc(cx,cy-8,26,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a8a3a'; ctx.beginPath(); ctx.arc(cx-6,cy-14,18,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+6,cy-14,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#48a848'; ctx.beginPath(); ctx.arc(cx,cy-20,16,0,Math.PI*2); ctx.fill();
}
function drawRock(obs) {
  const cx=obs.x+obs.w/2, cy=obs.y+obs.h/2;
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.beginPath(); ctx.ellipse(cx+4,cy+8,obs.w/2,8,0,0,Math.PI*2); ctx.fill();
  const grad=ctx.createRadialGradient(cx-8,cy-6,2,cx,cy,obs.w/2);
  grad.addColorStop(0,'#c8c8c8'); grad.addColorStop(1,'#888');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.moveTo(obs.x+10,obs.y+obs.h); ctx.bezierCurveTo(obs.x,obs.y+obs.h*0.6,obs.x+5,obs.y+5,obs.x+obs.w*0.4,obs.y); ctx.bezierCurveTo(obs.x+obs.w*0.6,obs.y,obs.x+obs.w,obs.y+obs.h*0.3,obs.x+obs.w,obs.y+obs.h*0.7); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.ellipse(cx-8,cy-8,10,6,-0.5,0,Math.PI*2); ctx.fill();
}
function drawPond(obs) {
  const cx=obs.x+obs.w/2, cy=obs.y+obs.h/2;
  const grad=ctx.createRadialGradient(cx,cy,10,cx,cy,obs.w/2);
  grad.addColorStop(0,'#4da6e8'); grad.addColorStop(1,'#2176ae');
  ctx.fillStyle=grad; ctx.beginPath(); ctx.ellipse(cx,cy,obs.w/2,obs.h/2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.ellipse(cx-20,cy-15,25,8,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+18,cy+10,16,5,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a8a3a';
  [[cx-30,cy+15],[cx+35,cy-10],[cx,cy+25]].forEach(([lx,ly]) => {
    ctx.beginPath(); ctx.arc(lx,ly,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff6b8a'; ctx.beginPath(); ctx.arc(lx,ly-2,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a8a3a';
  });
  ctx.strokeStyle='#1a5f8a'; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(cx,cy,obs.w/2,obs.h/2,0,0,Math.PI*2); ctx.stroke();
}
function drawFence(obs) {
  ctx.fillStyle='#c8a050'; ctx.fillRect(obs.x,obs.y,obs.w,obs.h);
  ctx.strokeStyle='#a07830'; ctx.lineWidth=1.5; ctx.strokeRect(obs.x,obs.y,obs.w,obs.h);
  for (let px=obs.x; px<=obs.x+obs.w; px+=20) {
    ctx.fillStyle='#b09040'; ctx.fillRect(px-3,obs.y-4,6,obs.h+8);
    ctx.strokeStyle='#806820'; ctx.lineWidth=1; ctx.strokeRect(px-3,obs.y-4,6,obs.h+8);
  }
}
const animalEmojis = {};
ANIMALS.forEach(a => { animalEmojis[a.id]=a.emoji; });
function drawPlayer(p) {
  const {x,y,isIt,animal,name,color}=p;
  const emoji=animalEmojis[animal]||'🐱';
  const r=PLAYER_R, isMe=p.id===myId;
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(x+3,y+r+2,r,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle = isIt ? '#ff3333' : (color||'#aaa');
  ctx.fill();
  if (isIt) {
    ctx.strokeStyle='#ffdd00'; ctx.lineWidth=3.5; ctx.beginPath(); ctx.arc(x,y,r+4,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#ffdd00'; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center'; ctx.fillText('IT!',x,y-r-8);
  }
  if (isMe) { ctx.strokeStyle='white'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(x,y,r+2,0,Math.PI*2); ctx.stroke(); }
  ctx.font=`${r*1.1}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emoji,x,y+1);
  ctx.font='bold 11px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(0,0,0,0.65)';
  const tw=ctx.measureText(name).width+10;
  ctx.fillRect(x-tw/2,y+r+4,tw,14);
  ctx.fillStyle='white'; ctx.fillText(name,x,y+r+15);
}
function drawTagRadius(p) {
  if (!p||!p.isIt||p.id!==myId) return;
  ctx.strokeStyle='rgba(255,80,80,0.35)'; ctx.lineWidth=1.5; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.arc(p.x,p.y,TAG_RANGE,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
}
function render() {
  ctx.clearRect(0,0,WORLD_W,WORLD_H); drawGround(); drawObstacles();
  const me=players[myId]; if (me) drawTagRadius(me);
  Object.values(players).sort((a,b)=>(a.isIt?1:-1)-(b.isIt?1:-1)).forEach(drawPlayer);
}
function gameLoop(ts) {
  if (!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  const me=players[myId];
  if (me) {
    let dx=0, dy=0;
    if (keys['ArrowLeft']||keys['a']||keys['A']||mobileKeys.left) dx-=1;
    if (keys['ArrowRight']||keys['d']||keys['D']||mobileKeys.right) dx+=1;
    if (keys['ArrowUp']||keys['w']||keys['W']||mobileKeys.up) dy-=1;
    if (keys['ArrowDown']||keys['s']||keys['S']||mobileKeys.down) dy+=1;
    if (dx!==0&&dy!==0) { dx*=0.707; dy*=0.707; }
    if (dx!==0) me.facing=dx>0?'right':'left';
    const resolved=resolveCollision(me.x+dx*SPEED*dt, me.y+dy*SPEED*dt);
    me.x=resolved.x; me.y=resolved.y; me.vx=dx; me.vy=dy;
    if (ws&&ws.readyState===1) ws.send(JSON.stringify({type:'move',x:me.x,y:me.y,vx:me.vx,vy:me.vy,facing:me.facing}));
    if (tagCooldown>0) tagCooldown-=dt;
    if (me.isIt&&tagCooldown<=0) {
      for (const [id,p] of Object.entries(players)) {
        if (id===myId) continue;
        const dx2=me.x-p.x, dy2=me.y-p.y;
        if (Math.sqrt(dx2*dx2+dy2*dy2)<TAG_RANGE) { ws.send(JSON.stringify({type:'tag',targetId:id})); tagCooldown=1.5; break; }
      }
    }
  }
  render(); updateHUD(); requestAnimationFrame(gameLoop);
}
function updateHUD() {
  const me=players[myId], banner=document.getElementById('it-banner');
  if (me) {
    if (me.isIt) { banner.className='is-it'; banner.textContent='🏃 YOU ARE IT — tag someone!'; }
    else { const it=Object.values(players).find(p=>p.isIt&&p.id!==myId); banner.className='not-it'; banner.textContent=it?`😱 ${it.name} is IT — run!`:'⏳ Waiting for players…'; }
  }
  const board=document.getElementById('scoreboard');
  board.innerHTML=Object.values(players).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5).map(p=>`<span class="score-chip${p.id===myId?' me':''}">${animalEmojis[p.animal]||'?'} ${p.name}: ${p.score||0}</span>`).join('');
}
function showNotification(msg) {
  const el=document.getElementById('tag-notification'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
function flashTagEffect() {
  const el=document.getElementById('tag-flash'); el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),300);
}
function startGame(name,roomId,animal) {
  document.getElementById('lobby').style.display='none';
  document.getElementById('game-ui').style.display='flex';
  resizeCanvas(); myAnimal=animal;
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}`);
  ws.onopen=()=>ws.send(JSON.stringify({type:'join',roomId,name,animal:animal.id,color:animal.color}));
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if (msg.type==='welcome') { myId=msg.playerId; players={}; msg.players.forEach(p=>{players[p.id]=p;}); requestAnimationFrame(gameLoop); }
    else if (msg.type==='playerJoined') { players[msg.player.id]=msg.player; showNotification(`${animalEmojis[msg.player.animal]} ${msg.player.name} joined!`); }
    else if (msg.type==='playerLeft') { const gone=players[msg.id]; if(gone) showNotification(`${gone.name} left`); delete players[msg.id]; }
    else if (msg.type==='playerMoved') { if(players[msg.id]&&msg.id!==myId){players[msg.id].x=msg.x;players[msg.id].y=msg.y;players[msg.id].vx=msg.vx;players[msg.id].vy=msg.vy;players[msg.id].facing=msg.facing;} }
    else if (msg.type==='itAssigned') { Object.values(players).forEach(p=>{p.isIt=(p.id===msg.itId);}); if(msg.itId===myId){flashTagEffect();showNotification('🏃 You are IT! Go tag someone!');} }
    else if (msg.type==='tagged') {
      Object.values(players).forEach(p=>{p.isIt=(p.id===msg.taggedId);}); if(players[msg.taggerId]) players[msg.taggerId].score=msg.taggerScore;
      const tagger=players[msg.taggerId], tagged=players[msg.taggedId];
      if(msg.taggedId===myId){flashTagEffect();showNotification(`${tagger?tagger.name:'?'} tagged you — YOU'RE IT! 😱`);}
      else if(msg.taggerId===myId){showNotification(`✅ You tagged ${tagged?tagged.name:'?'}!`);}
      else{showNotification(`${tagger?tagger.name:'?'} tagged ${tagged?tagged.name:'?'}!`);}
    }
  };
  ws.onclose=()=>showNotification('Disconnected — refresh to reconnect');
}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
['up','down','left','right'].forEach(dir=>{
  const btn=document.getElementById('ctrl-'+dir);
  btn.addEventListener('pointerdown',()=>{mobileKeys[dir]=true;});
  btn.addEventListener('pointerup',()=>{mobileKeys[dir]=false;});
  btn.addEventListener('pointerleave',()=>{mobileKeys[dir]=false;});
});
</script>
